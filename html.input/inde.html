<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试 输入框 根据内容响应&切换元素标签</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap-theme.min.css" />
  </head>

  <body>
    <div class="container" id="app">
      <h1 class="text-center">测试 输入框 根据内容响应&切换元素标签</h1>
      <input type="text" class="form-control"></input>
    </div>
    <script src="https://fastly.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script>
      $(document).on('input','input',function(){
        console.log(this);
        console.log($(this).val());
        const indexOfSpace = $(this).val().indexOf(' ');
        const tag = $(this).val().substring(0, $(this).val().indexOf(' '));
        console.log(tag);
        switch (tag) {
          case '#':
            $(this).addClass('h1');
            break;
          default:
            break;
        }
      }) 
      $(document).on('change','input',function(){
        $(this).eq(0).after(`<p>${$(this).val()}</p>`)
        $(this).eq(0).css('display','none')
      })
      $(document).on('click','p',function(){
        $(this).eq(0).after(`<input type="text" class="form-control" value="${$(this).text()}"/>`)
        $(this).eq(0).css('display','none')
      })
    </script>
  </body>
</html>
